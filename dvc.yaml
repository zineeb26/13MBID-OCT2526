stages:
  data_visualization:
    cmd: python src/data_visualization.py
    deps:
      - src/data_visualization.py
      - data/raw/datos_creditos.csv
      - data/raw/datos_tarjetas.csv
    outs:
      - docs/figures/target_distribution.png
      - docs/figures/correlation_heatmap_creditos.png
      - docs/figures/correlation_heatmap_tarjetas.png
      - docs/figures/hist_ingresos_mora.png
      - docs/figures/mora_vivienda_proporcion.png
      - docs/reporte_verificacion_extra.html

  test_pandera:
    cmd: pytest --html=docs/report_basico.html --self-contained-html test/test_data_quality.py -v || true
    deps:
    - data/raw/datos_creditos.csv
    - data/raw/datos_tarjetas.csv
    - test/test_data_quality.py
    outs:
    - docs/report_basico.html
    
  test_ge:
    cmd: pytest --html=docs/report_ge.html --self-contained-html test/test_data_quality_ge.py -v || true
    deps:
    - data/raw/datos_creditos.csv
    - data/raw/datos_tarjetas.csv
    - test/test_data_quality_ge.py
    outs:
    - docs/report_ge.html
  
  data_processing:
    cmd: python src/data_prep.py
    deps:
      - src/data_prep.py
      - data/raw/datos_creditos.csv
      - data/raw/datos_tarjetas.csv
    outs:
      - data/processed/datos_integrados.csv
      - data/processed/resumen_dataset.txt
      - data/processed/reporte_metadatos.html
  
  train_model:
    cmd: python src/train_model.py
    deps:
      - src/train_model.py
      - data/processed/datos_integrados.csv
    outs: 
      - models/prod_model.pkl 
      - models/prod_preprocessor.pkl
      - docs/figures/confusion_matrix.png
    metrics:
      - metrics/train_metrics.json